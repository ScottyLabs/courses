services:
  postgres:
    image: postgres:18-alpine
    container_name: cmucourses-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: donotuseinproduction
      POSTGRES_DB: cmucourses_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
